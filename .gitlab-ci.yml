# Is performed before the scripts in the stages step
before_script:
    - git submodule init
    - git submodule update
    - export OMP_PROC_BIND=close
    - export OMP_PLACES=cores
    - export OMP_NUM_THREADS=1
    - export CMAKE_VERSION=3.15.3
    - export CTEST_OUTPUT_ON_FAILURE=1
    - export J=$(( $(nproc --all) / 4  + 1 )) && echo Using ${J} cores during build
    - wget -qO- http://www.cmake.org/files/v${CMAKE_VERSION:0:4}/cmake-${CMAKE_VERSION}-Linux-x86_64.tar.gz | tar -xz
    - export PATH=${PWD}/cmake-${CMAKE_VERSION}-Linux-x86_64/bin:$PATH
    - export GOLD_STANDARD_VER=2
    - if [ `cat external/parthenon/tst/regression/gold_standard/current_version` != ${GOLD_STANDARD_VER} ]; then
      echo "Updating regression Gold standard to ${GOLD_STANDARD_VER}." &&
      wget -qO- https://pgrete.de/dl/parthenon_regression_gold_r${GOLD_STANDARD_VER}.tgz | tar -xz -C external/parthenon/tst/regression/gold_standard; fi
    - export HDF5_VER=1.10.6
    - module load python3

cache:
  key: global-1
  paths:
    - external/parthenon/tst/regression/gold_standard/
    - local/

stages:
  - info
  - prep
  - regression


info:
  stage: info
  tags:
    - gpu
    - springdale7
  script:
    - free -m
    - hostname
    - module list
    - module avail
    - cat /etc/*elease
    - uname -a
#    - cat /proc/cpuinfo
    - lspci
    - nvidia-smi
    - nvidia-smi topo -m
    - module load gcc/7.3.0 python3 cudatoolkit/10.2
    - which nvcc
    - nvcc --version
    - module show cudatoolkit/10.2
    - git clone https://github.com/spack/spack.git
    - cd spack
    - git checkout develop
    - cd ..
    - export PATH=$(pwd)/spack/bin:$PATH
    - . $(pwd)/spack/share/spack/setup-env.sh
    - spack compilers
    - spack compiler find
    - spack compilers
    - cat ~/.spack/packages.yaml
    - '>~/.spack/packages.yaml'
    - spack external find 
    - ls ~/.spack
    - cat ~/.spack/packages.yaml
    - spack find
    - 'echo -ne "  all:\n    compiler: [gcc@7.3.0]\n" >> ~/.spack/packages.yaml'
    - 'echo -ne "  cuda:\n    buildable: False\n    paths:\n      cuda@10.2.89: /usr/local/cuda-10.2\n" >> ~/.spack/packages.yaml'
    - cat ~/.spack/packages.yaml
    - spack find
    - spack install openmpi@3.1.6 thread_multiple=True cuda=True
    - module avail
    - spack find
    - spack load openmpi@3.1.6
    - ompi_info
    - mkdir tmp
    - cd tmp
    - wget https://pgrete.de/dl/bw.tar
    - tar xvf bw.tar
    - mkdir build
    - cd build
    - export OMPI_CXX=${CI_PROJECT_DIR}/external/Kokkos/bin/nvcc_wrapper
    - cmake -DKokkos_ROOT=${CI_PROJECT_DIR}/external/Kokkos -DCMAKE_CXX_COMPILER=mpicxx -DKokkos_ENABLE_CUDA=True ..
    - make -j10
    - ldd ./mpi_bandwidth
    - mpirun -np 2 ./mpi_bandwidth --kokkos-ndevices=2
#    - mpirun -np 2 --mca btl ^openib --mca pml ucx ./mpi_bandwidth --kokkos-ndevices=2
#    - mpirun -np 2 --mca pml ^ucx --mca btl ^uct --mca btl_openib_allow_ib 1 ./mpi_bandwidth --kokkos-ndevices=2
#    - mpirun -np 2 --mca pml ^ucx --mca btl ^uct --mca btl_openib_want_cuda_gdr 1 --mca btl_openib_allow_ib 1 ./mpi_bandwidth --kokkos-ndevices=2
#    - mpirun -np 2 --mca btl '^openib' ./mpi_bandwidth --kokkos-ndevices=2
#	    - mpirun -np 2 --mca btl_openib_allow_ib 1 ./mpi_bandwidth --kokkos-ndevices=2
#	  x  - mpirun -np 2 --mca btl_openib_allow_ib 1 ./mpi_bandwidth --kokkos-ndevices=2
#	    - srun -n 2 ./mpi_bandwidth
    - cd ../..

prep-cuda:
  stage: prep
  tags:
    - gpu
    - springdale7
  script:
    - module load openmpi/cuda-10.2/gcc/4.0.3/64 gcc/7.3.0 cudatoolkit/10.2
    - if [ ! -d local/hdf5-${HDF5_VER}-gcc ]; then
      wget https://hdf-wordpress-1.s3.amazonaws.com/wp-content/uploads/manual/HDF5/HDF5_1_10_6/source/hdf5-${HDF5_VER}.tar.bz2;
      tar xjf hdf5-${HDF5_VER}.tar.bz2;
      mkdir -p ./local/hdf5-${HDF5_VER}-gcc/serial ./local/hdf5-${HDF5_VER}-gcc/parallel;
      cd hdf5-${HDF5_VER};
      CC=gcc ./configure --prefix=${PWD}/../local/hdf5-${HDF5_VER}-gcc/serial && make -j8 && make install && make clean;
      CC=mpicc ./configure --prefix=${PWD}/../local/hdf5-${HDF5_VER}-gcc/parallel --enable-parallel && make -j8 && make install && make clean;
      fi

parthenon-cuda-regression:
  tags:
    - gpu
    - springdale7
  stage: regression
  script:
    - module load openmpi/cuda-10.2/gcc/4.0.3/64 gcc/7.3.0 cudatoolkit/10.2
    - mkdir build-cuda
    - cd build-cuda
    - cmake -DCMAKE_BUILD_TYPE=Release -DHDF5_ROOT=${CI_PROJECT_DIR}/local/hdf5-${HDF5_VER}-gcc/serial
      -DKokkos_ENABLE_OPENMP=True -DKokkos_ARCH_SKX=True
      -DKokkos_ENABLE_CUDA=True -DKokkos_ARCH_VOLTA70=True
      -DCMAKE_CXX_COMPILER=${PWD}/../external/Kokkos/bin/nvcc_wrapper
      -DKokkos_ROOT=$(pwd)/../external/Kokkos
      -DPARTHENON_DISABLE_MPI=ON
      -DPARTHENON_LINT_DEFAULT=OFF
      ../
    - make -j${J} 
    - for M in 128; do
      for N in 128 64 32; do
        ./src/athenaPK -i ../inputs/linear_wave3d.in parthenon/meshblock/nx1=$((2*N)) parthenon/meshblock/nx2=$N parthenon/meshblock/nx3=$N parthenon/mesh/nx1=$((2*M)) parthenon/mesh/nx2=$M parthenon/mesh/nx3=$M parthenon/mesh/num_threads=1 parthenon/mesh/num_streams=1 hydro/use_scratch=false hydro/scratch_level=0;
      done; done
    - for M in 128; do
      for N in 128 64 32; do
        ./src/athenaPK -i ../inputs/linear_wave3d.in parthenon/meshblock/nx1=$((2*N)) parthenon/meshblock/nx2=$N parthenon/meshblock/nx3=$N parthenon/mesh/nx1=$((2*M)) parthenon/mesh/nx2=$M parthenon/mesh/nx3=$M parthenon/mesh/num_threads=1 parthenon/mesh/num_streams=1 hydro/use_scratch=true hydro/scratch_level=1;
      done; done
    - for M in 16 32 64 128; do
      export N=$M;
        ./src/athenaPK -i ../inputs/linear_wave3d.in parthenon/meshblock/nx1=$((2*N)) parthenon/meshblock/nx2=$N parthenon/meshblock/nx3=$N parthenon/mesh/nx1=$((2*M)) parthenon/mesh/nx2=$M parthenon/mesh/nx3=$M parthenon/mesh/num_threads=1 parthenon/mesh/num_streams=1 hydro/use_scratch=false hydro/scratch_level=0;
      done
    - for M in 16 32 64 128; do
      export N=$M;
        ./src/athenaPK -i ../inputs/linear_wave3d.in parthenon/meshblock/nx1=$((2*N)) parthenon/meshblock/nx2=$N parthenon/meshblock/nx3=$N parthenon/mesh/nx1=$((2*M)) parthenon/mesh/nx2=$M parthenon/mesh/nx3=$M parthenon/mesh/num_threads=1 parthenon/mesh/num_streams=1 hydro/use_scratch=true hydro/scratch_level=1;
      done
    - export N=256
    - export M=256
    - ./src/athenaPK -i ../inputs/linear_wave3d.in parthenon/meshblock/nx1=$N parthenon/meshblock/nx2=$N parthenon/meshblock/nx3=$N parthenon/mesh/nx1=$M parthenon/mesh/nx2=$M parthenon/mesh/nx3=$M parthenon/mesh/num_threads=1 parthenon/mesh/num_streams=1 hydro/use_scratch=false hydro/scratch_level=0 parthenon/time/nlim=20
    - ./src/athenaPK -i ../inputs/linear_wave3d.in parthenon/meshblock/nx1=$N parthenon/meshblock/nx2=$N parthenon/meshblock/nx3=$N parthenon/mesh/nx1=$M parthenon/mesh/nx2=$M parthenon/mesh/nx3=$M parthenon/mesh/num_threads=1 parthenon/mesh/num_streams=1 hydro/use_scratch=true hydro/scratch_level=1 parthenon/time/nlim=20
  artifacts:
    when: always
    expire_in: 3 days
    paths:
      - build-cuda/CMakeFiles/CMakeOutput.log
      - build-cuda/linearwave-errors.dat
