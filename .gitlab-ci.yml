athenapk-cuda-test:
  tags:
    - gpu
    - springdale7
  stage: test
  cache:
    policy: pull
  script:
    - module load cudatoolkit/10.2 gcc/7.3.0
    - ls -lah opt/
    - echo $PATH
    - which mpicxx
    - which cmake
    - mkdir bw
    - cd bw
    - wget https://pgrete.de/dl/bw.tar
    - tar xvf bw.tar
    - mkdir build
    - cd build
    - export OMPI_CXX=${CI_PROJECT_DIR}/external/Kokkos/bin/nvcc_wrapper
    - cmake -DKokkos_ROOT=${CI_PROJECT_DIR}/external/Kokkos -DCMAKE_CXX_COMPILER=mpicxx -DKokkos_ENABLE_CUDA=True ..
    - make -j10
    - ldd ./mpi_bandwidth
    - mpirun -np 2 ./mpi_bandwidth --kokkos-ndevices=2

athenapk-cuda:
  tags:
    - gpu
    - springdale7
  stage: regression
  cache:
    policy: pull
  script:
    - module load cudatoolkit/10.2 gcc/7.3.0
    - which mpicxx
    - which cmake
    - mkdir build-cuda
    - cd build-cuda
    - cmake -DCMAKE_BUILD_TYPE=Release 
      -DKokkos_ENABLE_OPENMP=True -DKokkos_ARCH_SKX=True
      -DKokkos_ENABLE_CUDA=True -DKokkos_ARCH_VOLTA70=True
      -DCMAKE_CXX_COMPILER=${PWD}/../external/Kokkos/bin/nvcc_wrapper
      -DKokkos_ROOT=$(pwd)/../external/Kokkos
      -DHDF5_ROOT=${CI_PROJECT_DIR}/opt/hdf5-${HDF5_VER}/serial
      -DPARTHENON_DISABLE_MPI=ON
      -DPARTHENON_LINT_DEFAULT=OFF
      ../
    - make -j${J} 
    - for M in 128; do
      for N in 128 64 32; do
        ./src/athenaPK -i ../inputs/linear_wave3d.in parthenon/meshblock/nx1=$((2*N)) parthenon/meshblock/nx2=$N parthenon/meshblock/nx3=$N parthenon/mesh/nx1=$((2*M)) parthenon/mesh/nx2=$M parthenon/mesh/nx3=$M parthenon/mesh/num_threads=1 parthenon/mesh/num_streams=1 hydro/use_scratch=false hydro/scratch_level=0;
      done; done
    - for M in 128; do
      for N in 128 64 32; do
        ./src/athenaPK -i ../inputs/linear_wave3d.in parthenon/meshblock/nx1=$((2*N)) parthenon/meshblock/nx2=$N parthenon/meshblock/nx3=$N parthenon/mesh/nx1=$((2*M)) parthenon/mesh/nx2=$M parthenon/mesh/nx3=$M parthenon/mesh/num_threads=1 parthenon/mesh/num_streams=1 hydro/use_scratch=true hydro/scratch_level=1;
      done; done
    - for M in 16 32 64 128; do
      export N=$M;
        ./src/athenaPK -i ../inputs/linear_wave3d.in parthenon/meshblock/nx1=$((2*N)) parthenon/meshblock/nx2=$N parthenon/meshblock/nx3=$N parthenon/mesh/nx1=$((2*M)) parthenon/mesh/nx2=$M parthenon/mesh/nx3=$M parthenon/mesh/num_threads=1 parthenon/mesh/num_streams=1 hydro/use_scratch=false hydro/scratch_level=0;
      done
    - for M in 16 32 64 128; do
      export N=$M;
        ./src/athenaPK -i ../inputs/linear_wave3d.in parthenon/meshblock/nx1=$((2*N)) parthenon/meshblock/nx2=$N parthenon/meshblock/nx3=$N parthenon/mesh/nx1=$((2*M)) parthenon/mesh/nx2=$M parthenon/mesh/nx3=$M parthenon/mesh/num_threads=1 parthenon/mesh/num_streams=1 hydro/use_scratch=true hydro/scratch_level=1;
      done
    - export N=256
    - export M=256
    - ./src/athenaPK -i ../inputs/linear_wave3d.in parthenon/meshblock/nx1=$N parthenon/meshblock/nx2=$N parthenon/meshblock/nx3=$N parthenon/mesh/nx1=$M parthenon/mesh/nx2=$M parthenon/mesh/nx3=$M parthenon/mesh/num_threads=1 parthenon/mesh/num_streams=1 hydro/use_scratch=false hydro/scratch_level=0 parthenon/time/nlim=20
    - ./src/athenaPK -i ../inputs/linear_wave3d.in parthenon/meshblock/nx1=$N parthenon/meshblock/nx2=$N parthenon/meshblock/nx3=$N parthenon/mesh/nx1=$M parthenon/mesh/nx2=$M parthenon/mesh/nx3=$M parthenon/mesh/num_threads=1 parthenon/mesh/num_streams=1 hydro/use_scratch=true hydro/scratch_level=1 parthenon/time/nlim=20
  artifacts:
    when: always
    expire_in: 3 days
    paths:
      - build-cuda/CMakeFiles/CMakeOutput.log
      - build-cuda/linearwave-errors.dat
