variables:
  SPACK_VER: '0.15.1'

# Is performed before the scripts in the stages step
before_script:
    - git submodule init
    - git submodule update
    - export OMP_PROC_BIND=close
    - export OMP_PLACES=cores
    - export OMP_NUM_THREADS=1
    - export CMAKE_VERSION=3.15.3
    - export CTEST_OUTPUT_ON_FAILURE=1
    - export J=$(( $(nproc --all) / 4  + 1 )) && echo Using ${J} cores during build
    - export HDF5_VER=1.10.6
    - if [ ! -d spack-${SPACK_VER} ]; then
      wget -qO- https://github.com/spack/spack/releases/download/v${SPACK_VER}/spack-${SPACK_VER}.tar.gz | tar -xz;
      cp .spack-env/packages.yaml spack-${SPACK_VER}/etc/spack/;
      fi
    - rm -rf ~/.spack
    - . spack-${SPACK_VER}/share/spack/setup-env.sh
    - module load python3

cache:
  key: global-2
  paths:
    - spack-${SPACK_VER}
    - local/

stages:
  - prep
  - regression


prep:
  stage: prep
  tags:
    - gpu
    - springdale7
  script:
#    - module load intel-mpi/intel-19.2.187
#    - spack compiler find
#    - spack install hdf5@1.10.6 mpi=False %intel@19.0.2.187
#    - spack find
#    - spack install hdf5@1.10.6 mpi=True %intel@19.0.2.187 ^intel-mpi@2019.2.187
#    - spack find
#    - icpc --version
#    - mpiicpc --version
#    - which icpc
#    - module purge
    - module load cudatoolkit/10.2
    - spack install gcc@8.4.0
    - spack compilers
    - spack compiler find
    - spack compilers
    - spack load gcc@8.4.0
    - spack compilers
    - spack compiler find
    - spack compilers
    - spack install mvapich2@2.3.4 cuda=True %gcc@8.4.0
    - spack install hdf5@1.10.6 mpi=False %gcc@8.4.0
    - spack install hdf5@1.10.6 mpi=True %gcc@8.4.0 ^mvapich2@2.3.4
    - spack clean
    - spack find

parthenon-cuda-regression:
  tags:
    - gpu
    - springdale7
  stage: regression
  cache:
    policy: pull
  script:
    - failme
    - module load openmpi/cuda-10.2/gcc/4.0.3/64 gcc/7.3.0 cudatoolkit/10.2
    - mkdir build-cuda
    - cd build-cuda
    - cmake -DCMAKE_BUILD_TYPE=Release -DHDF5_ROOT=${CI_PROJECT_DIR}/local/hdf5-${HDF5_VER}-gcc/serial
      -DKokkos_ENABLE_OPENMP=True -DKokkos_ARCH_SKX=True
      -DKokkos_ENABLE_CUDA=True -DKokkos_ARCH_VOLTA70=True
      -DCMAKE_CXX_COMPILER=${PWD}/../external/Kokkos/bin/nvcc_wrapper
      -DKokkos_ROOT=$(pwd)/../external/Kokkos
      -DPARTHENON_DISABLE_MPI=ON
      -DPARTHENON_LINT_DEFAULT=OFF
      ../
    - make -j${J} 
    - for M in 128; do
      for N in 128 64 32; do
        ./src/athenaPK -i ../inputs/linear_wave3d.in parthenon/meshblock/nx1=$((2*N)) parthenon/meshblock/nx2=$N parthenon/meshblock/nx3=$N parthenon/mesh/nx1=$((2*M)) parthenon/mesh/nx2=$M parthenon/mesh/nx3=$M parthenon/mesh/num_threads=1 parthenon/mesh/num_streams=1 hydro/use_scratch=false hydro/scratch_level=0;
      done; done
    - for M in 128; do
      for N in 128 64 32; do
        ./src/athenaPK -i ../inputs/linear_wave3d.in parthenon/meshblock/nx1=$((2*N)) parthenon/meshblock/nx2=$N parthenon/meshblock/nx3=$N parthenon/mesh/nx1=$((2*M)) parthenon/mesh/nx2=$M parthenon/mesh/nx3=$M parthenon/mesh/num_threads=1 parthenon/mesh/num_streams=1 hydro/use_scratch=true hydro/scratch_level=1;
      done; done
    - for M in 16 32 64 128; do
      export N=$M;
        ./src/athenaPK -i ../inputs/linear_wave3d.in parthenon/meshblock/nx1=$((2*N)) parthenon/meshblock/nx2=$N parthenon/meshblock/nx3=$N parthenon/mesh/nx1=$((2*M)) parthenon/mesh/nx2=$M parthenon/mesh/nx3=$M parthenon/mesh/num_threads=1 parthenon/mesh/num_streams=1 hydro/use_scratch=false hydro/scratch_level=0;
      done
    - for M in 16 32 64 128; do
      export N=$M;
        ./src/athenaPK -i ../inputs/linear_wave3d.in parthenon/meshblock/nx1=$((2*N)) parthenon/meshblock/nx2=$N parthenon/meshblock/nx3=$N parthenon/mesh/nx1=$((2*M)) parthenon/mesh/nx2=$M parthenon/mesh/nx3=$M parthenon/mesh/num_threads=1 parthenon/mesh/num_streams=1 hydro/use_scratch=true hydro/scratch_level=1;
      done
    - export N=256
    - export M=256
    - ./src/athenaPK -i ../inputs/linear_wave3d.in parthenon/meshblock/nx1=$N parthenon/meshblock/nx2=$N parthenon/meshblock/nx3=$N parthenon/mesh/nx1=$M parthenon/mesh/nx2=$M parthenon/mesh/nx3=$M parthenon/mesh/num_threads=1 parthenon/mesh/num_streams=1 hydro/use_scratch=false hydro/scratch_level=0 parthenon/time/nlim=20
    - ./src/athenaPK -i ../inputs/linear_wave3d.in parthenon/meshblock/nx1=$N parthenon/meshblock/nx2=$N parthenon/meshblock/nx3=$N parthenon/mesh/nx1=$M parthenon/mesh/nx2=$M parthenon/mesh/nx3=$M parthenon/mesh/num_threads=1 parthenon/mesh/num_streams=1 hydro/use_scratch=true hydro/scratch_level=1 parthenon/time/nlim=20
  artifacts:
    when: always
    expire_in: 3 days
    paths:
      - build-cuda/CMakeFiles/CMakeOutput.log
      - build-cuda/linearwave-errors.dat
