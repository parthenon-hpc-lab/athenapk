variables:
  SPACK_VER: '0.15.1'

# Is performed before the scripts in the stages step
before_script:
    - git submodule init
    - git submodule update
    - export OMP_PROC_BIND=close
    - export OMP_PLACES=cores
    - export OMP_NUM_THREADS=1
    - export CTEST_OUTPUT_ON_FAILURE=1
    - export J=$(( $(nproc --all) / 4  + 1 )) && echo Using ${J} cores during build
    - if [ ! -d spack-${SPACK_VER} ]; then
      rm -rf ~/.spack;
      wget -qO- https://github.com/spack/spack/releases/download/v${SPACK_VER}/spack-${SPACK_VER}.tar.gz | tar -xz;
      fi
    - cp .spack-env/* spack-${SPACK_VER}/etc/spack/
    - . spack-${SPACK_VER}/share/spack/setup-env.sh
    - module load python3

cache:
  key: global-3
  paths:
    - spack-${SPACK_VER}

stages:
#  - prep-icc
  - prep-cuda
  - regression


prep-cuda:
  stage: prep-cuda
  tags:
    - gpu
    - springdale7
  script:
    - module load cudatoolkit/10.2 gcc/7.3.0
    - spack compilers
    - spack install --only package mvapich2@2.3.4+cuda %gcc@7.3.0
    - spack install --only package cmake@3.15.5~ncurses~openssl
    - spack install --only package hdf5@1.10.6 mpi=False %gcc@7.3.0
    - spack install --only package hdf5@1.10.6 mpi=True %gcc@7.3.0 ^mvapich2@2.3.4+cuda
    - spack clean -sd
    - spack find -L -x -v
    - du -hs spack-${SPACK_VER}
    - du -hs spack-${SPACK_VER}/*
    - du -hs spack-${SPACK_VER}/opt/spack/*
    - du -hs spack-${SPACK_VER}/opt/spack/*/*
    - du -hs spack-${SPACK_VER}/opt/spack/*/*/*

