variables:
  OMPI_VER: '3.1.6'
  CMAKE_VER: '3.15.4'
  HDF5_VER: '1.10.6'

# Is performed before the scripts in the stages step
before_script:
    - git submodule init
    - git submodule update
    - export OMP_PROC_BIND=close
    - export OMP_PLACES=cores
    - export OMP_NUM_THREADS=1
    - export CTEST_OUTPUT_ON_FAILURE=1
    - export J=$(( $(nproc --all) / 4  + 1 )) && echo Using ${J} cores during build
    - export PATH=${PWD}/opt/cmake-${CMAKE_VERSION}-Linux-x86_64/bin:$PATH
    - export PATH=${PWD}/opt/openmpi-${OMPI_VER}/bin:$PATH
    - export LD_LIBRARY_PATH=${PWD}/opt/openmpi-${OMPI_VER}/lib:$LD_LIBRARY_PATH
    - module load python3

cache:
  key: global-4
  paths:
    - opt/

stages:
  - prep-cuda
  - test
  - prep-icc
  - regression


prep-cuda:
  stage: prep-cuda
  tags:
    - gpu
    - springdale7
  script:
    - module load cudatoolkit/10.2 gcc/7.3.0
    - if [ ! -d opt/openmpi-${OMPI_VER} ]; then
      mkdir -p tmp;
      cd tmp;
      wget https://download.open-mpi.org/release/open-mpi/v3.1/openmpi-${OMPI_VER}.tar.bz2;
      tar xjf openmpi-${OMPI_VER}.tar.bz2;
      cd openmpi-${OMPI_VER};
      ./configure --prefix=${CI_PROJECT_DIR}/opt/openmpi-${OMPI_VER} --enable-mpi-fortran=none --enable-mpi-cxx --with-cuda;
      make -j16;
      make install;
      cd ../..;
      fi
    - if [ ! -d opt/hdf5-${HDF5_VER} ]; then
      mkdir -p tmp;
      cd tmp;
      wget https://hdf-wordpress-1.s3.amazonaws.com/wp-content/uploads/manual/HDF5/HDF5_1_10_6/source/hdf5-${HDF5_VER}.tar.bz2;
      tar xjf hdf5-${HDF5_VER}.tar.bz2;
      cd hdf5-${HDF5_VER};
      CC=gcc ./configure --prefix=${CI_PROJECT_DIR}/opt/hdf5-${HDF5_VER}/serial && make -j16 && make install && make clean;
      CC=mpicc ./configure --prefix=${CI_PROJECT_DIR}/opt/hdf5-${HDF5_VER}/parallel --enable-parallel && make -j16 && make install && make clean;
      cd ../..;
      fi
    - if [ ! -d opt/cmake-${CMAKE_VER}-Linux-x86_64 ]; then
      cd opt;
      wget -qO- http://www.cmake.org/files/v${CMAKE_VER:0:4}/cmake-${CMAKE_VER}-Linux-x86_64.tar.gz | tar -xz;
      cd ..;
      fi
      

prep-icc:
  stage: prep-icc
  tags:
    - gpu
    - springdale7
  script:
    - module load intel-mpi/intel-19.2.187
    - if [ ! -d opt/hdf5-${HDF5_VER}/intel ]; then
      mkdir -p tmp;
      cd tmp;
      wget https://hdf-wordpress-1.s3.amazonaws.com/wp-content/uploads/manual/HDF5/HDF5_1_10_6/source/hdf5-${HDF5_VER}.tar.bz2;
      tar xjf hdf5-${HDF5_VER}.tar.bz2;
      cd hdf5-${HDF5_VER};
      CC=icc ./configure --prefix=${CI_PROJECT_DIR}/opt/hdf5-${HDF5_VER}/intel/serial && make -j16 && make install && make clean;
      CC=mpiicc ./configure --prefix=${CI_PROJECT_DIR}/opt/hdf5-${HDF5_VER}/intel/parallel --enable-parallel && make -j16 && make install && make clean;
      cd ../..;
      fi
